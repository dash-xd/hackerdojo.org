services:
  jekyll:
    build:
      context: .

    working_dir: /workspace

    user: "${UID:-1000}:${GID:-1000}"

    ports:
      - "4000:4000"
      - "35729:35729"

    environment:
      BUNDLE_PATH: /bundle
      JEKYLL_ENV: development

    volumes:
      # Your source code
      - .:/workspace

      # Persistent gem cache
      - bundle_cache:/bundle

    command: >
      sh -lc '
        bundle install &&
        bundle exec jekyll serve
          --host 0.0.0.0
          --livereload
          --force_polling
      '

volumes:
  bundle_cache:
