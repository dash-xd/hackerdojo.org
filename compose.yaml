services:
  jekyll:
    build: .

    working_dir: /workspace

    ports:
      - "4000:4000"
      - "35729:35729"

    volumes:
      - .:/workspace
      - bundle_cache:/bundle

    command:
      - sh
      - -lc
      - |
        bundle install
        bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling

volumes:
  bundle_cache:
